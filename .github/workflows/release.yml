name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Run Electron smoke test
        run: bun run test:smoke

      - name: Build workspace
        run: bun run build

  release:
    name: Build ${{ matrix.platform }}
    needs: test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-latest
            command: bunx electron-builder --mac --publish always
          - platform: windows
            os: windows-latest
            command: bunx electron-builder --win --publish always
          - platform: linux
            os: ubuntu-latest
            command: bunx electron-builder --linux --publish always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop app
        run: bun run --filter @git-ingest/desktop build

      - name: Build and publish
        run: ${{ matrix.command }}
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
