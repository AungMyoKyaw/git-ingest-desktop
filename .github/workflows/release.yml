name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Run Electron smoke test
        run: bun run test:smoke

      - name: Build workspace
        run: bun run build

  release:
    name: Build ${{ matrix.platform }}
    needs: test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-latest
            command: bunx electron-builder --mac --publish never
          - platform: windows
            os: windows-latest
            command: bunx electron-builder --win --x64 --publish never
          - platform: linux
            os: ubuntu-latest
            command: bunx electron-builder --linux --publish never

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build desktop app
        run: bun run --filter @git-ingest/desktop build

      - name: Build package
        run: ${{ matrix.command }}
        working-directory: packages/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.blockmap
            packages/desktop/release/*.deb
            packages/desktop/release/*.dmg
            packages/desktop/release/*.exe
            packages/desktop/release/*.rpm
            packages/desktop/release/*.yml
            packages/desktop/release/*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release delete "$TAG_NAME" --yes || true
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes "Release $TAG_NAME"
          find release-assets -type f -print0 | xargs -0 gh release upload "$TAG_NAME"
