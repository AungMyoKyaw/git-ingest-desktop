<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Git-Ingest icon</title>
  <desc id="desc">A folded code bundle mark with connected git nodes.</desc>
